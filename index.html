<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>A Journey of Learning</title>

  <link
    href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css"
    rel="stylesheet"
  />

  <script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>

  <!-- thêm ?v=9 để tránh Safari cache CSS cũ -->
  <link rel="stylesheet" href="style.css?v=9">
</head>

<body>

  <div id="map"></div>

  <div id="ending-screen">
  <div class="ending-inner">

    <div class="ending-small">
      A FINAL THOUGHT
    </div>

    <div class="ending-text">
      I came to Singapore wondering:
    </div>

    <div class="ending-old">
      Can Vietnam be the new Singapore?
    </div>

    <div class="ending-text">
      I returned with another question:
    </div>

    <div class="ending-main">
      Can Vietnam be the new Vietnam?
    </div>

  </div>
</div>
  
  <div class="day-buttons">
    <button class="day-btn" data-id="1">DAY 1</button>
    <button class="day-btn" data-id="2">DAY 2</button>
    <button class="day-btn" data-id="3">DAY 3</button>
  </div>

  <div id="content"></div>

  <!-- thêm ?v=9 để tránh Safari cache JS cũ -->
  <script src="script.js?v=9"></script>

</body>
</html>
